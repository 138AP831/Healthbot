<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">

  <rect x="0" y="0" width="1200" height="620" fill="#0a0e14"/>

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#5ee7ff"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#4dffb8"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#ffb84d"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#ff5d8f"/>
    </marker>
  </defs>

  <text x="600" y="26" text-anchor="middle" font-size="18" font-weight="600" fill="#8fe9ff">Chatbot conversation logic</text>

  <!-- User message -->
  <rect x="520" y="40" width="160" height="44" rx="10" fill="none" stroke="#5ee7ff" stroke-width="2" filter="url(#glow)"/>
  <text x="600" y="67" text-anchor="middle" font-size="13" font-weight="600" fill="#c9f7ff">User message</text>

  <path d="M600 84 L600 108" stroke="#5ee7ff" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="24;0" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Greeting -->
  <rect x="460" y="112" width="280" height="48" rx="10" fill="none" stroke="#7f77ff" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#d6d2ff">Greeting + quick-reply buttons</text>
  <text x="600" y="148" text-anchor="middle" font-size="11" fill="#a9a2ff">(Suggestions logic)</text>

  <!-- Branch lines from greeting down then out to 3 columns -->
  <path d="M600 160 L600 178 L150 178 L150 196" stroke="#4dffb8" stroke-width="2" fill="none" marker-end="url(#arrow-teal)" stroke-dasharray="8 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="1.4s" begin="1s" repeatCount="indefinite"/>
  </path>
  <path d="M600 160 L600 196" stroke="#ffb84d" stroke-width="2" fill="none" marker-end="url(#arrow-amber)" stroke-dasharray="8 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="36;0" dur="1.1s" begin="1s" repeatCount="indefinite"/>
  </path>
  <path d="M600 160 L600 178 L1050 178 L1050 196" stroke="#ff5d8f" stroke-width="2" fill="none" marker-end="url(#arrow-pink)" stroke-dasharray="8 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="1.4s" begin="1s" repeatCount="indefinite"/>
  </path>

  <!-- ===================== COLUMN 1: Book Appointment (teal neon), center x=150 ===================== -->
  <rect x="30" y="200" width="240" height="46" rx="10" fill="none" stroke="#4dffb8" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#c9ffe9">Book Appointment</text>

  <path d="M150 246 L150 268" stroke="#4dffb8" stroke-width="2" fill="none" marker-end="url(#arrow-teal)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="3s" repeatCount="indefinite"/>
  </path>

  <rect x="30" y="272" width="240" height="60" rx="10" fill="none" stroke="#4dffb8" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#c9ffe9">Collect Leads</text>
  <text x="150" y="313" text-anchor="middle" font-size="10" fill="#8effda">name, reason, contact,</text>
  <text x="150" y="326" text-anchor="middle" font-size="10" fill="#8effda">date/time, insurance</text>

  <path d="M150 332 L150 354" stroke="#4dffb8" stroke-width="2" fill="none" marker-end="url(#arrow-teal)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="4s" repeatCount="indefinite"/>
  </path>

  <rect x="30" y="358" width="240" height="44" rx="10" fill="none" stroke="#4dffb8" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="4s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#c9ffe9">"Confirm Booking" button</text>

  <path d="M150 402 L150 424" stroke="#4dffb8" stroke-width="2" fill="none" marker-end="url(#arrow-teal)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="5s" repeatCount="indefinite"/>
  </path>

  <rect x="30" y="428" width="240" height="44" rx="10" fill="none" stroke="#4dffb8" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="5s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="454" text-anchor="middle" font-size="12" font-weight="600" fill="#c9ffe9">Zap button trigger</text>

  <path d="M150 472 L150 494" stroke="#4dffb8" stroke-width="2" fill="none" marker-end="url(#arrow-teal)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="6s" repeatCount="indefinite"/>
  </path>

  <rect x="30" y="498" width="240" height="52" rx="10" fill="none" stroke="#4dffb8" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="6s" repeatCount="indefinite"/>
  </rect>
  <text x="150" y="521" text-anchor="middle" font-size="12" font-weight="600" fill="#c9ffe9">Zap actions</text>
  <text x="150" y="537" text-anchor="middle" font-size="10" fill="#8effda">Google Sheets / Calendar / Slack</text>

  <!-- ===================== COLUMN 2: Ask a Question (amber then pink neon), center x=600 ===================== -->
  <rect x="490" y="200" width="220" height="46" rx="10" fill="none" stroke="#ffb84d" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#ffe9c9">Ask a Question</text>

  <path d="M600 246 L600 268" stroke="#ffb84d" stroke-width="2" fill="none" marker-end="url(#arrow-amber)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="3s" repeatCount="indefinite"/>
  </path>

  <rect x="480" y="272" width="240" height="46" rx="10" fill="none" stroke="#ffb84d" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#ffe9c9">Knowledge base lookup</text>

  <path d="M600 318 L600 340" stroke="#ffb84d" stroke-width="2" fill="none" marker-end="url(#arrow-amber)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="4s" repeatCount="indefinite"/>
  </path>

  <rect x="475" y="344" width="250" height="46" rx="10" fill="none" stroke="#ff5d8f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="4s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="363" text-anchor="middle" font-size="11" font-weight="600" fill="#ffd6e3">low confidence / medical</text>
  <text x="600" y="377" text-anchor="middle" font-size="11" font-weight="600" fill="#ffd6e3">question</text>

  <path d="M600 390 L600 412" stroke="#ff5d8f" stroke-width="2" fill="none" marker-end="url(#arrow-pink)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="5s" repeatCount="indefinite"/>
  </path>

  <rect x="470" y="416" width="260" height="50" rx="10" fill="none" stroke="#ff5d8f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="5s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="439" text-anchor="middle" font-size="12" font-weight="600" fill="#ffd6e3">Escalation message</text>
  <text x="600" y="455" text-anchor="middle" font-size="11" fill="#ffb3ce">+ staff flag</text>

  <!-- ===================== COLUMN 3: Talk to Staff (pink neon), center x=1050 ===================== -->
  <rect x="930" y="200" width="240" height="46" rx="10" fill="none" stroke="#ff5d8f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="1050" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#ffd6e3">Talk to Staff</text>

  <path d="M1050 246 L1050 268" stroke="#ff5d8f" stroke-width="2" fill="none" marker-end="url(#arrow-pink)" stroke-dasharray="6 6" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="22;0" dur="1s" begin="3s" repeatCount="indefinite"/>
  </path>

  <rect x="920" y="272" width="260" height="60" rx="10" fill="none" stroke="#ff5d8f" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;3;2" keyTimes="0;0.5;1" dur="6s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="1050" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#ffd6e3">Immediate escalation</text>
  <text x="1050" y="315" text-anchor="middle" font-size="11" fill="#ffb3ce">staff notified directly</text>

  <!-- Legend -->
  <g transform="translate(60,580)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="none" stroke="#7f77ff" stroke-width="1.5"/>
    <text x="20" y="11" font-size="11" fill="#9aa0b0">Entry / routing</text>
    <rect x="170" y="0" width="14" height="14" rx="3" fill="none" stroke="#4dffb8" stroke-width="1.5"/>
    <text x="190" y="11" font-size="11" fill="#9aa0b0">Booking flow</text>
    <rect x="330" y="0" width="14" height="14" rx="3" fill="none" stroke="#ffb84d" stroke-width="1.5"/>
    <text x="350" y="11" font-size="11" fill="#9aa0b0">FAQ flow</text>
    <rect x="460" y="0" width="14" height="14" rx="3" fill="none" stroke="#ff5d8f" stroke-width="1.5"/>
    <text x="480" y="11" font-size="11" fill="#9aa0b0">Escalation to staff</text>
  </g>

</svg>
